<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="BJJ" />
  <meta name="theme-color" content="#ffffff" />
  <title>BJJ</title>

  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/transitions.css" />
  <link rel="stylesheet" href="css/log-sheet.css" />
  <link rel="stylesheet" href="css/log-pages.css" />
</head>
<body>

  <div id="app">

    <!-- Pages -->
    <main id="page-container">
      <div id="page-home"     class="page active" data-page="home"></div>
      <div id="page-sessions" class="page"        data-page="sessions"></div>
      <div id="page-insights" class="page"        data-page="insights"></div>
      <div id="page-profile"  class="page"        data-page="profile"></div>
    </main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav" aria-label="Main navigation">
      <div id="nav-track">
        <div id="nav-pill"></div>

        <button class="nav-item active" data-target="home" aria-label="Home">
          <span class="nav-icon">
            <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M5 11.8L14 4l9 7.8V23a1 1 0 01-1 1H6a1 1 0 01-1-1V11.8z" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M10.5 24V17h7v7" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="nav-label">Home</span>
        </button>

        <button class="nav-item" data-target="sessions" aria-label="Sessions">
          <span class="nav-icon">
            <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="4" y="5" width="20" height="20" rx="4" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M19 3v4M9 3v4M4 11h20" stroke-width="1.7" stroke-linecap="round"/>
              <path d="M9 16h4M9 20h6" stroke-width="1.7" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="nav-label">Sessions</span>
        </button>

        <button class="nav-item nav-item--log" data-target="log" aria-label="Log session">
          <span class="nav-icon">
            <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="14" cy="14" r="10" stroke-width="1.7"/>
              <path d="M14 9v10M9 14h10" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="nav-label">Log</span>
        </button>

        <button class="nav-item" data-target="insights" aria-label="Insights">
          <span class="nav-icon">
            <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M5 20l5.5-6 4 4L20 10l3 3" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="22" cy="7" r="2.5" stroke-width="1.7"/>
            </svg>
          </span>
          <span class="nav-label">Insights</span>
        </button>

        <button class="nav-item" data-target="profile" aria-label="Profile">
          <span class="nav-icon">
            <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="14" cy="9.5" r="4.5" stroke-width="1.7"/>
              <path d="M5 24c0-4.97 4.03-9 9-9s9 4.03 9 9" stroke-width="1.7" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="nav-label">Profile</span>
        </button>

      </div>
    </nav>

    <!-- Log slide-up sheet (fixed, sits above everything) -->
    <div id="log-backdrop"></div>
    <div id="log-sheet" role="dialog" aria-modal="true" aria-label="Log session">
      <div id="log-sheet-handle-area">
        <div id="log-sheet-handle"></div>
      </div>
      <div id="log-sheet-header">
        <button id="log-sheet-back" aria-label="Back">
          <svg viewBox="0 0 12 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 2L2 10l8 8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span id="log-sheet-back-label">Back</span>
        </button>
        <span id="log-sheet-title"></span>
        <button id="log-sheet-close" aria-label="Close">
          <svg viewBox="0 0 12 12" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 1l10 10M11 1L1 11"/>
          </svg>
        </button>
      </div>
      <div id="log-sheet-body">

        <!-- Page 1: Session Type -->
        <div class="log-page" id="log-page-1">
          <div class="log-page-heading">
            <div class="log-page-title">Log a Session</div>
            <div class="log-page-date" id="log-p1-date"></div>
          </div>
          <div class="session-type-grid">

            <button class="session-tile session-tile--rolling" id="tile-rolling">
              <div class="session-tile-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path d="M12 3C9 3 6.5 5 6.5 8c0 2 1 3.5 2.5 4.5L7 21h10l-2-8.5C16.5 11.5 17.5 10 17.5 8c0-3-2.5-5-5.5-5z" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <div class="session-tile-title">Rolling</div>
              <div class="session-tile-subtitle">Drilling &amp; sparring</div>
            </button>

            <button class="session-tile session-tile--coaching disabled" id="tile-coaching">
              <div class="session-tile-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke-linecap="round" stroke-linejoin="round"/>
                  <circle cx="9" cy="7" r="4" stroke-linecap="round"/>
                  <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <div class="session-tile-title">Coaching</div>
              <div class="session-tile-subtitle">Teaching a class</div>
            </button>

            <button class="session-tile session-tile--competition disabled" id="tile-competition">
              <div class="session-tile-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path d="M8 21h8M12 17v4M7 4H5a1 1 0 00-1 1v3c0 3.31 2.69 6 6 6h4c3.31 0 6-2.69 6-6V5a1 1 0 00-1-1h-2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M8 4h8" stroke-linecap="round"/>
                </svg>
              </div>
              <div class="session-tile-title">Competition</div>
              <div class="session-tile-subtitle">Tournament or event</div>
            </button>

            <button class="session-tile session-tile--promotion disabled" id="tile-promotion">
              <div class="session-tile-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <div class="session-tile-title">Promotion</div>
              <div class="session-tile-subtitle">Grading day</div>
            </button>

          </div>
        </div>

        <!-- Page 2: Session Format -->
        <div class="log-page" id="log-page-2">
          <div class="log-page-heading">
            <div class="log-page-title">Session Type</div>
            <div class="log-page-date">What kind of session was it?</div>
          </div>
          <div class="format-list">

            <button class="format-tile" id="tile-regular">
              <div class="format-tile-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                  <circle cx="9" cy="7" r="4" stroke-width="1.7" stroke-linecap="round"/>
                  <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <div class="format-tile-text">
                <div class="format-tile-title">Regular Class</div>
                <div class="format-tile-subtitle">Structured class with drilling and sparring</div>
              </div>
              <div class="format-tile-chevron">
                <svg viewBox="0 0 12 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M2 2l8 8-8 8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </button>

            <button class="format-tile" id="tile-comp-class">
              <div class="format-tile-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M8 21h8M12 17v4M7 4H5a1 1 0 00-1 1v3c0 3.31 2.69 6 6 6h4c3.31 0 6-2.69 6-6V5a1 1 0 00-1-1h-2" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M8 4h8" stroke-width="1.7" stroke-linecap="round"/>
                </svg>
              </div>
              <div class="format-tile-text">
                <div class="format-tile-title">Competition Class</div>
                <div class="format-tile-subtitle">Intensive training focused on comp prep</div>
              </div>
              <div class="format-tile-chevron">
                <svg viewBox="0 0 12 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M2 2l8 8-8 8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </button>

            <button class="format-tile" id="tile-open-mat">
              <div class="format-tile-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect x="3" y="3" width="18" height="18" rx="3" stroke-width="1.7" stroke-linecap="round"/>
                  <path d="M8 12h8M12 8v8" stroke-width="1.7" stroke-linecap="round"/>
                </svg>
              </div>
              <div class="format-tile-text">
                <div class="format-tile-title">Open Mat</div>
                <div class="format-tile-subtitle">Free rolling, no structured instruction</div>
              </div>
              <div class="format-tile-chevron">
                <svg viewBox="0 0 12 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M2 2l8 8-8 8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </button>

            <button class="format-tile" id="tile-private">
              <div class="format-tile-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M20 21v-2a4 4 0 00-4-4h-4a4 4 0 00-4 4v2" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                  <circle cx="12" cy="7" r="4" stroke-width="1.7" stroke-linecap="round"/>
                  <path d="M16 3.5C17.5 4.5 18 6 18 7" stroke-width="1.7" stroke-linecap="round"/>
                </svg>
              </div>
              <div class="format-tile-text">
                <div class="format-tile-title">Private</div>
                <div class="format-tile-subtitle">One-on-one session with a coach</div>
              </div>
              <div class="format-tile-chevron">
                <svg viewBox="0 0 12 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M2 2l8 8-8 8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </button>

          </div>
        </div>

        <!-- Page 3 onwards -->
        <div class="log-page" id="log-page-3"></div>

      </div>
    </div>

  </div>

  <script src="js/router.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/log-sheet.js"></script>
  <script src="js/log-pages.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
